name: KAIROSKOP CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Python: lint, type check, unit tests
  # ─────────────────────────────────────────────────────────────────
  python-checks:
    name: Python Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint with ruff
        run: ruff check kafka/ spark/ scripts/

      - name: Type check with mypy
        run: |
          mypy kafka/schemas.py \
               kafka/producer_wikipedia.py \
               kafka/producer_gdelt.py \
               kafka/producer_arxiv.py \
               spark/enrichment.py \
               --ignore-missing-imports \
               --no-strict-optional

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        if: hashFiles('tests/**') != ''

  # ─────────────────────────────────────────────────────────────────
  # Terraform: validate and format check
  # ─────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init (local backend, no credentials needed)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  # ─────────────────────────────────────────────────────────────────
  # Bruin: validate pipeline assets
  # ─────────────────────────────────────────────────────────────────
  bruin-validate:
    name: Bruin Asset Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bruin CLI
        run: |
          curl -LO https://github.com/bruin-data/bruin/releases/latest/download/bruin_linux_amd64.tar.gz
          tar -xzf bruin_linux_amd64.tar.gz
          sudo mv bruin /usr/local/bin/
          bruin --version

      - name: Validate Bruin pipeline
        working-directory: bruin
        run: bruin validate .
        env:
          GCP_PROJECT_ID: "ci-validation-placeholder"
          BQ_DATASET: "kairoskop"
