version: "3.8"

# KAIROSKOP — Local Development Environment
# Provides: Zookeeper, Kafka (broker + UI), Spark (master + worker)
# Start with: docker-compose up -d
# Stop with:  docker-compose down -v

services:

  # ─────────────────────────────────────────────────────────────────
  # Zookeeper — Kafka cluster coordination
  # ─────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kairoskop-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ─────────────────────────────────────────────────────────────────
  # Kafka Broker — message bus for all 4 attention streams
  # Topics: wiki_pageviews, wiki_changes, gdelt_events, arxiv_papers
  # ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kairoskop-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # External (host → container)
      - "29092:29092"     # Internal (container → container)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824   # 1 GB per segment
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ─────────────────────────────────────────────────────────────────
  # Kafka UI — visual topic browser (http://localhost:8080)
  # ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kairoskop-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kairoskop-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────────────────────────────────────────────────────────
  # Topic Initializer — creates topics with correct settings
  # ─────────────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kairoskop-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic wiki_pageviews --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic wiki_changes --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic gdelt_events --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic arxiv_papers --partitions 2 --replication-factor 1
      echo 'All 4 topics created.'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  # ─────────────────────────────────────────────────────────────────
  # Spark Master
  # ─────────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: kairoskop-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"   # Spark master
      - "8081:8080"   # Spark UI (http://localhost:8081)
    volumes:
      - ./spark:/opt/spark/jobs
      - ./credentials:/opt/spark/credentials:ro
      - spark_checkpoints:/tmp/checkpoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Spark Worker
  # ─────────────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: kairoskop-spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    volumes:
      - ./spark:/opt/spark/jobs
      - ./credentials:/opt/spark/credentials:ro
      - spark_checkpoints:/tmp/checkpoints

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  spark_checkpoints:
